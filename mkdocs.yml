---
site_name: "{{project_name}}"
site_description: "{{project_description}}"
site_author: "{{org_name}}"
site_url: "https://{{org_name}}.github.io/{{project_name}}/"
repo_url: "https://github.com/{{org_name}}/{{project_name}}"
repo_name: "{{org_name}}/{{project_name}}"
edit_uri: edit/main/docs/
# ---------------------------------------------------------------------------
# Template Variables — Update these when using this template.
# All {{ variable }} references across the docs site are driven from here.
# ---------------------------------------------------------------------------
extra:
  project_name: "project_name"
  project_description: "{{project_description}}"
  org_name: "{{organization}}"
  org_email: "conduct@{{organization}}.com"
  docs_url: "https://{{org_name}}.github.io/{{project_name}}"
  min_python: "3.9"
  current_major_version: "0"
  slack_url: "https://slack.{{organization}}.org"
  blog_url: "https://blog.{{organization}}.org"
  roadmap_url: "https://github.com/{{organization}}/project_name/milestones"
theme:
  name: material
  logo: assets/branding/icon-white.svg
  favicon: assets/branding/icon-black.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.action.edit
    - content.tabs.link
    - content.tooltips
    - toc.follow
    - toc.integrate
    - header.autohide
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - "."
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.magiclink
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - toc:
      permalink: true
plugins:
  - macros
  - mike
  - minify:
      minify_html: true
  - mkdocs-nav-weight
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: sphinx
  - search
  - section-index
  - tags
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - scripts/extra.js
# ---------------------------------------------------------------------------
# LLM & AI Tooling
# ---------------------------------------------------------------------------
# llms.txt (root-level file) is served at /llms.txt on the deployed docs site.
# It follows the llmstxt.org specification and provides a curated, machine-
# readable index of documentation for LLM consumers and AI coding agents.
# A companion file, llms-full.txt, contains the concatenated documentation.
# The root AGENTS.md contains agent-specific coding instructions; it is also
# surfaced in the docs nav under Community > AI Agent Guide.
# ---------------------------------------------------------------------------
validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    absolute_links: warn
    unrecognized_links: warn
