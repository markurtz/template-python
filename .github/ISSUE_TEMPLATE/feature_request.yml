---
name: Feature Request
description: Suggest an idea for template-python
labels:
  - "enhancement"
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a feature for template-python!
        Before submitting, please ensure you have searched our existing [Issues](https://github.com/markurtz/template-python/issues) and [Discussions](https://github.com/markurtz/template-python/discussions) to see if this feature has already been requested.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem? Please describe.
      description: A clear and concise description of what the problem is.
      placeholder: "Ex. I'm always frustrated when [...]"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
      placeholder: "Ex. I would like an API that allows me to [...]"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features
        you've considered.
      placeholder: "Ex. I tried using feature X, but it didn't work because [...]"
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
      placeholder: "Add any mockups, log snippets, or other context here..."
  - type: checkboxes
    id: contribute
    attributes:
      label: Willingness to contribute
      description: Would you be willing to contribute a pull request for this feature?
      options:
        - label: Yes, I am willing to submit a PR!
