---
# =============================================================================
# development.yml
#
# Triggers:
#   pull_request → main
#
# Stage 1 — Quality & Security
# Stage 2 — Tests (Unit & Integration)
# Stage 3 — Docs (Conditional on changes)
# Stage 4 — Build Package
# Stage 5 — Comment on PR
# =============================================================================
name: "CI — Development"
on:
  pull_request:
    branches:
      - main
concurrency:
  group: "dev-${{ github.head_ref }}"
  cancel-in-progress: true
permissions:
  contents: read
jobs:

  # ── Determine Changes ──────────────────────────────────────────────────────
  changes:
    name: "Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Check for docs changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'mkdocs.yml'

  # ── Stage 1: Quality & Security ────────────────────────────────────────────
  quality:
    name: "Quality Gate"
    uses: ./.github/workflows/_quality.yml
    with:
      python_versions: '["3.10", "3.14"]'
    permissions:
      contents: read
      security-events: write
  security:
    name: "Security Audit"
    uses: ./.github/workflows/_security.yml
    permissions:
      contents: read
      security-events: write

  # ── Stage 2: Tests ─────────────────────────────────────────────────────────
  tests:
    name: "Run Tests"
    uses: ./.github/workflows/_tests.yml
    with:
      test_matrix: >-
        [
          {"level": "unit", "types": "smoke, sanity"},
          {"level": "integration", "types": "smoke"}
        ]
      python_versions: '["3.10", "3.14"]'
      generate_coverage: true
      publish_results: true
      retention_days: 7

  # ── Stage 3: Docs (Conditional) ────────────────────────────────────────────
  docs:
    name: "Build & Deploy Docs"
    needs:
      - changes
      - tests
    if: needs.changes.outputs.docs == 'true' && github.event.pull_request.head.repo.fork ==
      false
    uses: ./.github/workflows/_docs.yml
    permissions:
      contents: write
    with:
      build_type: "dev-branch"
      alias: "pr-${{ github.event.pull_request.number }}"
      include_coverage: true

  # ── Stage 4: Build ─────────────────────────────────────────────────────────
  build:
    name: "Build Package"
    uses: ./.github/workflows/_build_package.yml
    with:
      build_type: "dev"
