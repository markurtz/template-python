# ─────────────────────────────────────────────────────────────────────────────
# _publish.yml — Reusable Artifact Publisher
#
# Handles publishing built artifacts or containers to an artifact repository
# or container registry.
#
# Inputs:
#   build_location — Directory path containing the built artifacts (if package)
#   build_type     — The type of build (e.g., nightly, release)
#
# Callers: nightly.yml, release.yml
# ─────────────────────────────────────────────────────────────────────────────
name: "Publish Artifacts (Reusable)"

on:
  workflow_call:
    inputs:
      build_location:
        description: "Directory path containing the built artifacts"
        required: false
        type: string
        default: ""
      build_type:
        description: "The type of build (e.g., nightly, release)"
        required: true
        type: string

permissions:
  contents: read
  packages: write  # To publish to GitHub Container Registry or GitHub Packages

jobs:

  publish:
    name: "Publish (${{ inputs.build_type }})"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
