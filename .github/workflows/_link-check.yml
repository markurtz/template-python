---
# ─────────────────────────────────────────────────────────────────────────────
# _link-check.yml
#
# Validates that all hyperlinks in project documentation and Markdown files
# are reachable and not returning errors.
#
# Inputs:
#   fail_on_error — whether to fail the workflow on broken links (default: true)
#
# Outputs:
#   report_content — The content of the link check report.
#
# Callers: development.yml, nightly.yml, release.yml
# ─────────────────────────────────────────────────────────────────────────────
name: "Link Checker (Reusable)"
on:
  workflow_call:
    inputs:
      fail_on_error:
        description: "Fail the workflow if broken links are detected"
        required: false
        type: boolean
        default: true
    outputs:
      report_content:
        description: "The contents of the link check report"
        value: ${{ jobs.link-check.outputs.report_content }}
permissions:
  contents: read
jobs:
  link-check:
    name: "Check Links"
    runs-on: ubuntu-latest
    outputs:
      report_content: ${{ steps.read-report.outputs.content }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2
        id: lychee
        with:
          args: --verbose --no-progress --accept 200,206,301,302,429 --exclude-loopback --exclude
            "\{\{[^}]+\}\}" '**/*.md'
          fail: ${{ inputs.fail_on_error }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Read report content
        id: read-report
        if: always()
        run: |-
          if [ -f "lychee/out.md" ]; then
            # Read file into output variable safely
            EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
            echo "content<<$EOF" >> "$GITHUB_OUTPUT"
            cat lychee/out.md >> "$GITHUB_OUTPUT"
            echo "$EOF" >> "$GITHUB_OUTPUT"
          else
            echo "content=No link errors found." >> "$GITHUB_OUTPUT"
          fi
